<!DOCTYPE html>
<html>
<head>
    <title>API 17 & 47 Test & Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .info { background: #d1ecf1; border-color: #bee5eb; }
        button { margin: 5px; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .url { font-family: monospace; background: #f8f9fa; padding: 5px; }
    </style>
</head>
<body>
    <h1>🔧 API 17 & 47 - Test & Debug</h1>
    
    <div class="test-section info">
        <h2>🔍 Server Status Check</h2>
        <button onclick="checkServer()">Check Server Status</button>
        <div id="server-status"></div>
    </div>

    <div class="test-section">
        <h2>📋 API 17: Get Navigation</h2>
        <p><strong>Expected URL:</strong> <span class="url">GET /api/public/site/navigation</span></p>
        <button onclick="testAPI17()">Test API 17</button>
        <div id="api17-result"></div>
    </div>

    <div class="test-section">
        <h2>📋 API 47: Get Site Config</h2>
        <p><strong>Expected URL:</strong> <span class="url">GET /api/admin/pages/site-config</span></p>
        <button onclick="testAPI47()">Test API 47</button>
        <div id="api47-result"></div>
    </div>

    <div class="test-section">
        <h2>🔧 Alternative URLs Test</h2>
        <p>Testing different URL variations to find the correct ones:</p>
        <button onclick="testAlternatives()">Test All Variations</button>
        <div id="alternatives-result"></div>
    </div>

    <script>
        async function checkServer() {
            const statusDiv = document.getElementById('server-status');
            statusDiv.innerHTML = '<p>Checking server...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/status');
                const data = await response.json();
                statusDiv.innerHTML = `
                    <div class="success">
                        <h3>✅ Server is Running</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                statusDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Server Connection Failed</h3>
                        <p>Make sure server is running: <code>cd server && npm run dev</code></p>
                        <pre>Error: ${error.message}</pre>
                    </div>
                `;
            }
        }

        async function testAPI17() {
            const resultDiv = document.getElementById('api17-result');
            resultDiv.innerHTML = '<p>Testing API 17...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/public/site/navigation');
                const data = await response.text();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ API 17 Success (${response.status})</h3>
                            <p><strong>URL:</strong> GET /api/public/site/navigation</p>
                            <pre>${data}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ API 17 Failed (${response.status})</h3>
                            <p><strong>URL:</strong> GET /api/public/site/navigation</p>
                            <pre>${data}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ API 17 Connection Error</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        async function testAPI47() {
            const resultDiv = document.getElementById('api47-result');
            resultDiv.innerHTML = '<p>Testing API 47...</p>';
            
            try {
                const response = await fetch('http://localhost:5000/api/admin/pages/site-config');
                const data = await response.text();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ API 47 Success (${response.status})</h3>
                            <p><strong>URL:</strong> GET /api/admin/pages/site-config</p>
                            <pre>${data}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ API 47 Failed (${response.status})</h3>
                            <p><strong>URL:</strong> GET /api/admin/pages/site-config</p>
                            <pre>${data}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ API 47 Connection Error</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        async function testAlternatives() {
            const resultDiv = document.getElementById('alternatives-result');
            resultDiv.innerHTML = '<p>Testing alternative URLs...</p>';
            
            const urlsToTest = [
                // API 17 alternatives
                { name: 'API 17 - Option 1', url: '/api/public/site/navigation' },
                { name: 'API 17 - Option 2', url: '/api/public/navbar/navigation' },
                { name: 'API 17 - Option 3', url: '/api/public/navigation' },
                
                // API 47 alternatives  
                { name: 'API 47 - Option 1', url: '/api/admin/pages/site-config' },
                { name: 'API 47 - Option 2', url: '/api/admin/site-config' },
                { name: 'API 47 - Option 3', url: '/api/admin/config' }
            ];
            
            let results = '<h3>🔍 Testing All URL Variations:</h3>';
            
            for (const test of urlsToTest) {
                try {
                    const response = await fetch(`http://localhost:5000${test.url}`);
                    const status = response.status;
                    
                    if (response.ok) {
                        results += `<div class="success">✅ ${test.name}: ${test.url} (${status})</div>`;
                    } else {
                        results += `<div class="error">❌ ${test.name}: ${test.url} (${status})</div>`;
                    }
                } catch (error) {
                    results += `<div class="error">❌ ${test.name}: ${test.url} (Connection Error)</div>`;
                }
            }
            
            resultDiv.innerHTML = results;
        }

        // Auto-check server status on page load
        window.onload = function() {
            checkServer();
        };
    </script>
</body>
</html>
